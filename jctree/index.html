<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Fiber Tree</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="jc-page-shell">
    <div class="jc-page-head">
        <div>
            <h1> JC Fiber Tree View</h1>
            <div class="jc-page-subtitle">Select a window to load JCs</div>
        </div>

        <div class="jc-page-filter">
            <button id="lineTrackerTrigger" type="button">Line Tracker</button>
            <button id="jcWindowPickerTrigger" type="button">Select Window</button>
        </div>
    </div>

    <div id="jcNotepadMount" class="jc-page-body"></div>
</div>

<div class="line-tracker-panel" id="lineTrackerPanel" aria-hidden="true">
    <div class="line-tracker-card">
        <div class="line-tracker-head">
            <div>
                <h2>Line Tracker</h2>
                <p>Audit pending and recovered line incidents.</p>
            </div>
            <button id="lineTrackerClose" type="button">Close</button>
        </div>
        <iframe
            id="lineTrackerFrame"
            title="Line Tracker"
            data-src="https://virtualbackoffice3-cell.github.io/vbo4.0/jctree/linedown/"
        ></iframe>
    </div>
</div>

<div class="jc-window-modal" id="jcWindowModal">
    <div class="jc-window-card">
        <h2>Please Select Window</h2>
        <p>Only the selected window data will be shown.</p>
        <div class="jc-window-actions">
            <button type="button" class="jc-window-option" data-window="AMANWIZ">AMANWIZ</button>
            <button type="button" class="jc-window-option" data-window="MEDANTA">MEDANTA</button>
            <button type="button" class="jc-window-option" data-window="SEVAI">SEVAI</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="jc-notepad.js"></script>
<script>
    (() => {
        const panel = document.getElementById("lineTrackerPanel");
        const frame = document.getElementById("lineTrackerFrame");
        const openBtn = document.getElementById("lineTrackerTrigger");
        const closeBtn = document.getElementById("lineTrackerClose");

        function openLineTracker() {
            if (!frame.src) {
                frame.src = frame.dataset.src;
            }
            panel.classList.add("show");
            panel.setAttribute("aria-hidden", "false");
        }

        function closeLineTracker() {
            panel.classList.remove("show");
            panel.setAttribute("aria-hidden", "true");
        }

        openBtn.addEventListener("click", openLineTracker);
        closeBtn.addEventListener("click", closeLineTracker);
        panel.addEventListener("click", (event) => {
            if (event.target === panel) closeLineTracker();
        });
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && panel.classList.contains("show")) {
                closeLineTracker();
            }
        });
    })();
</script>
</body>
</html>
