<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Fiber Tree</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css?v=medanta-fms-4">
</head>
<body>

<div class="jc-page-shell">
    <div class="jc-page-head">
        <div>
            <h1> JC Fiber Tree View</h1>
            <div class="jc-page-subtitle">Select a window to load JCs</div>
        </div>

        <div class="jc-page-filter">
            <button id="lineTrackerTrigger" type="button">
                <span>Route History</span>
                <span id="routeHistoryPendingBadge" class="route-history-pending-badge" hidden>0</span>
            </button>
            <button id="jcWindowPickerTrigger" type="button">Select Window</button>
        </div>
    </div>

    <div id="jcNotepadMount" class="jc-page-body"></div>
</div>

<div class="line-tracker-panel" id="lineTrackerPanel" aria-hidden="true">
    <div class="line-tracker-card">
        <div class="line-tracker-head">
            <div>
                <h2>Route UP/Down history</h2>
                <p id="routeHistorySummary">Loading route history...</p>
            </div>
            <div class="route-history-actions">
                <input id="routeHistorySearch" type="search" placeholder="Search route history" aria-label="Search route history">
                <select id="routeHistoryWindow" aria-label="Window"></select>
                <button id="routeHistoryRefresh" type="button">Refresh</button>
                <button id="lineTrackerClose" type="button">Close</button>
            </div>
        </div>
        <div class="route-history">
            <section class="route-tabs" aria-label="Route UP/Down history views">
                <button class="route-tab active" type="button" data-route-tab="pending">
                    <span>Pending</span>
                    <span class="route-tab-count">0</span>
                </button>
                <button class="route-tab" type="button" data-route-tab="history">
                    <span>History</span>
                    <span class="route-tab-count">0</span>
                </button>
            </section>
            <section class="route-status-strip">
                <span id="routeHistoryWindowBadge">Window</span>
                <span id="routeHistoryUpdatedBadge">Last updated: --</span>
            </section>
            <section id="routeHistoryMessage" class="route-message" hidden></section>
            <section id="routeHistoryRecords" class="route-records" aria-live="polite"></section>
        </div>
    </div>
</div>

<div class="route-confirm-modal" id="routeConfirmModal" aria-hidden="true">
    <div class="route-confirm-card" role="dialog" aria-modal="true" aria-labelledby="routeConfirmTitle">
        <h2 id="routeConfirmTitle">Confirm action</h2>
        <p id="routeConfirmMessage">Please confirm this action.</p>
        <div class="route-confirm-actions">
            <button id="routeConfirmCancel" type="button">Cancel</button>
            <button id="routeConfirmOk" type="button">Confirm</button>
        </div>
    </div>
</div>

<div class="jc-window-modal" id="jcWindowModal">
    <div class="jc-window-card">
        <h2>Please Select Window</h2>
        <p>Only the selected window data will be shown.</p>
        <div class="jc-window-actions">
            <button type="button" class="jc-window-option" data-window="AMANWIZ">AMANWIZ</button>
            <button type="button" class="jc-window-option" data-window="MEDANTA">MEDANTA</button>
            <button type="button" class="jc-window-option" data-window="SEVAI">SEVAI</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="jc-notepad.js?v=medanta-fms-6"></script>
</body>
</html>
