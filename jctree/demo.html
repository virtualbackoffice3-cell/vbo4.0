<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JC Fiber Tree Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css?v=medanta-fms-2">
    <style>
        .demo-account-badge {
            display: inline-flex;
            align-items: center;
            margin-top: 8px;
            padding: 6px 10px;
            border: 1px solid rgba(15, 23, 42, 0.14);
            border-radius: 6px;
            background: #fff7ed;
            color: #9a3412;
            font-size: 12px;
            font-weight: 700;
        }

        .demo-account-toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 99999;
            max-width: min(360px, calc(100vw - 36px));
            padding: 12px 14px;
            border-radius: 8px;
            background: #111827;
            color: #ffffff;
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.24);
            font-size: 14px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .demo-account-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .demo-disabled-control {
            cursor: not-allowed !important;
            opacity: 0.62;
            filter: grayscale(0.25);
        }

        #jcSearchInput.demo-disabled-control {
            background: #f3f4f6;
            color: #6b7280;
        }

        .demo-search-modal {
            position: fixed;
            inset: 0;
            z-index: 100000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.42);
        }

        .demo-search-modal.show {
            display: flex;
        }

        .demo-search-card {
            width: min(460px, 100%);
            padding: 24px;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 22px 60px rgba(15, 23, 42, 0.26);
            color: #0f172a;
        }

        .demo-search-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            padding: 7px 10px;
            border-radius: 6px;
            background: #eef6ff;
            color: #075985;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .demo-search-card h2 {
            margin: 0 0 8px;
            font-size: 22px;
            line-height: 1.2;
        }

        .demo-search-card p {
            margin: 0;
            color: #475569;
            font-size: 15px;
            line-height: 1.55;
        }

        .demo-search-card button {
            margin-top: 18px;
            padding: 10px 16px;
            border: 0;
            border-radius: 6px;
            background: #0f172a;
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="jc-page-shell">
    <div class="jc-page-head">
        <div>
            <h1> JC Fiber Tree View</h1>
            <div class="jc-page-subtitle">Select a window to load demo JCs</div>
            <div class="demo-account-badge">Demo account</div>
        </div>

        <div class="jc-page-filter">
            <button id="lineTrackerTrigger" type="button">
                <span>Route History</span>
                <span id="routeHistoryPendingBadge" class="route-history-pending-badge" hidden>0</span>
            </button>
            <button id="jcWindowPickerTrigger" type="button">Select Window</button>
        </div>
    </div>

    <div id="jcNotepadMount" class="jc-page-body"></div>
</div>

<div class="line-tracker-panel" id="lineTrackerPanel" aria-hidden="true">
    <div class="line-tracker-card">
        <div class="line-tracker-head">
            <div>
                <h2>Route UP/Down history</h2>
                <p id="routeHistorySummary">Loading route history...</p>
            </div>
            <div class="route-history-actions">
                <input id="routeHistorySearch" type="search" placeholder="Search route history" aria-label="Search route history">
                <select id="routeHistoryWindow" aria-label="Window"></select>
                <button id="routeHistoryRefresh" type="button">Refresh</button>
                <button id="lineTrackerClose" type="button">Close</button>
            </div>
        </div>
        <div class="route-history">
            <section class="route-tabs" aria-label="Route UP/Down history views">
                <button class="route-tab active" type="button" data-route-tab="pending">
                    <span>Pending</span>
                    <span class="route-tab-count">0</span>
                </button>
                <button class="route-tab" type="button" data-route-tab="history">
                    <span>History</span>
                    <span class="route-tab-count">0</span>
                </button>
            </section>
            <section class="route-status-strip">
                <span id="routeHistoryWindowBadge">Window</span>
                <span id="routeHistoryUpdatedBadge">Last updated: --</span>
            </section>
            <section id="routeHistoryMessage" class="route-message" hidden></section>
            <section id="routeHistoryRecords" class="route-records" aria-live="polite"></section>
        </div>
    </div>
</div>

<div class="route-confirm-modal" id="routeConfirmModal" aria-hidden="true">
    <div class="route-confirm-card" role="dialog" aria-modal="true" aria-labelledby="routeConfirmTitle">
        <h2 id="routeConfirmTitle">Confirm action</h2>
        <p id="routeConfirmMessage">Please confirm this action.</p>
        <div class="route-confirm-actions">
            <button id="routeConfirmCancel" type="button">Cancel</button>
            <button id="routeConfirmOk" type="button">Confirm</button>
        </div>
    </div>
</div>

<div class="jc-window-modal" id="jcWindowModal">
    <div class="jc-window-card">
        <h2>Please Select Window</h2>
        <p>Only masked demo data will be shown.</p>
        <div class="jc-window-actions">
            <button type="button" class="jc-window-option" data-window="AMANWIZ">AMANWIZ</button>
            <button type="button" class="jc-window-option" data-window="MEDANTA">MEDANTA</button>
            <button type="button" class="jc-window-option" data-window="SEVAI">SEVAI</button>
        </div>
    </div>
</div>

<script src="demo-guard.js?v=demo-1"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="jc-notepad.js?v=medanta-fms-2"></script>
</body>
</html>
