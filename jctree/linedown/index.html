<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Amanwiz Line Tracker</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Amanwiz Line Tracker</h1>
          <p id="summaryText">Loading tracker data...</p>
        </div>
        <div class="top-actions">
          <select id="windowSelect" aria-label="Window"></select>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
      </header>

      <section class="tabs" aria-label="Line tracker views">
        <button class="tab active" type="button" data-tab="pending">Pending</button>
        <button class="tab" type="button" data-tab="history">History</button>
      </section>

      <section class="status-strip">
        <span id="windowBadge">Window</span>
        <span id="updatedBadge">Last updated: --</span>
        <span id="countBadge">0 records</span>
      </section>

      <section id="messageBox" class="message" hidden></section>
      <section id="records" class="records" aria-live="polite"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
