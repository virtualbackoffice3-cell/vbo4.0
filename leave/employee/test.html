<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Panel - EMP0001</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Leave Panel</h2>

    <div class="card">
        <h3>Apply Leave</h3>
        <input type="date" id="from_date">
        <input type="date" id="to_date">
        <textarea id="reason" placeholder="Reason"></textarea>
        <input type="text" id="handover" placeholder="Handover To">
        <button onclick="applyLeave()">Apply</button>
    </div>

    <div class="card">
        <h3>My Leaves</h3>
        <div class="table-wrapper">
            <table id="leaveTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- JavaScript Import -->
<script src="script.js"></script>

</body>
</html>
