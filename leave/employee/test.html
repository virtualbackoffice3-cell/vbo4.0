<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Leave Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h2>Leave Panel</h2>
        <span class="emp-badge" id="empBadge">EMP0001</span>
    </div>

    <!-- Apply Leave Card -->
    <div class="card">
        <div class="card-header">
            <span class="card-icon">📝</span>
            <h3>Apply Leave</h3>
        </div>
        
        <div class="form-row">
            <div class="form-group half">
                <label>From</label>
                <input type="date" id="from_date" class="form-input" min="">
            </div>
            <div class="form-group half">
                <label>To</label>
                <input type="date" id="to_date" class="form-input" min="">
            </div>
        </div>

        <!-- Days Calculator -->
        <div class="days-box" id="daysBox">
            <span class="days-label">Total Days:</span>
            <span class="days-value" id="totalDays">0</span>
            <span class="days-suffix">day(s)</span>
        </div>

        <div class="form-group">
            <label>Reason</label>
            <textarea id="reason" class="form-input" placeholder="Reason (min. 10 chars)" rows="2"></textarea>
            <small class="char-counter"><span id="charCount">0</span>/10</small>
        </div>

        <div class="form-group">
            <label>Handover To</label>
            <input type="text" id="handover" class="form-input" placeholder="Colleague name">
        </div>

        <button class="apply-btn" id="applyBtn">
            <span>Apply Leave</span>
            <span class="btn-icon">→</span>
        </button>
    </div>

    <!-- My Leaves Card -->
    <div class="card">
        <div class="card-header">
            <span class="card-icon">📋</span>
            <h3>My Leaves</h3>
            <span class="stats-badge" id="leaveCount">0</span>
        </div>
        
        <!-- Month Filter -->
        <div class="filter-row">
            <select id="monthFilter" class="month-filter">
                <option value="">All Months</option>
                <option value="2024-01">Jan 2024</option>
                <option value="2024-02">Feb 2024</option>
                <option value="2024-03" selected>Mar 2024</option>
                <option value="2024-04">Apr 2024</option>
                <option value="2024-05">May 2024</option>
                <option value="2024-06">Jun 2024</option>
                <option value="2024-07">Jul 2024</option>
                <option value="2024-08">Aug 2024</option>
                <option value="2024-09">Sep 2024</option>
                <option value="2024-10">Oct 2024</option>
                <option value="2024-11">Nov 2024</option>
                <option value="2024-12">Dec 2024</option>
            </select>
            <span class="total-days-badge" id="monthTotalDays">0 days</span>
        </div>
        
        <!-- Stats with Rejected -->
        <div class="stats-row">
            <div class="stat-pill total">
                <span class="stat-dot">●</span>
                <span id="totalLeaves">0</span> Total
            </div>
            <div class="stat-pill approved">
                <span class="stat-dot">●</span>
                <span id="approvedLeaves">0</span> Approved
            </div>
            <div class="stat-pill pending">
                <span class="stat-dot">●</span>
                <span id="pendingLeaves">0</span> Pending
            </div>
            <div class="stat-pill rejected">
                <span class="stat-dot">●</span>
                <span id="rejectedLeaves">0</span> Rejected
            </div>
        </div>

        <!-- Table with Days Column -->
        <div class="table-wrapper">
            <table id="leaveTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Days</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="leaveTableBody">
                    <tr>
                        <td colspan="5" class="empty-state">
                            <span>📋</span>
                            <p>No leaves</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="action-bar">
        <button class="action-btn" id="refreshBtn" title="Refresh">↻</button>
        <button class="action-btn" id="clearBtn" title="Clear">⌫</button>
        <button class="action-btn" id="topBtn" title="Top">↑</button>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Loading -->
<div class="loading" id="loading">⏳</div>

<script src="script.js"></script>
</body>
</html>
